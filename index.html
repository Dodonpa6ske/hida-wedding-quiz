<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズ大会 結果発表</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #fbf8f3;
    --bg-card: #ffffff;
    --paper-shadow: 0 4px 20px rgba(44,21,56,0.06), 0 1px 3px rgba(44,21,56,0.04);
    --text: #2c1538;
    --text-mid: #6b5b73;
    --text-light: #a59aad;
    --accent: #b8860b;
    --accent-bright: #d4af37;
    --accent-soft: #e8d795;
    --rose: #8b1538;
    --border: rgba(44,21,56,0.12);
    --border-soft: rgba(44,21,56,0.06);
    /* Shin Go preferred, with Noto Sans JP as the web fallback */
    --font-main: "A-OTF 新ゴ Pr6N", "A-OTF 新ゴ Pr5N", "新ゴ Pr6N", "新ゴ Pr5N", "新ゴ Pro", "Shin Go", "ShinGoPr6N", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic Medium", "Yu Gothic", "Meiryo", -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    height: 100%;
    width: 100%;
    font-family: var(--font-main);
    background: linear-gradient(180deg, #ffffff 0%, #faf6ef 100%);
    color: var(--text);
    overflow: hidden;
  }

  body { position: relative; }

  /* ===== Screen system ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.5s ease-out;
    overflow-y: auto;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ===== Editable title ===== */
  h1.brand {
    font-size: clamp(22px, 2.8vw, 36px);
    letter-spacing: 0.18em;
    color: var(--text);
    font-weight: 500;
    text-align: center;
    margin-bottom: 4px;
    padding: 4px 16px;
    border-radius: 6px;
    transition: background 0.2s;
    position: relative;
    outline: none;
  }
  h1.brand[contenteditable="true"]:hover {
    background: rgba(184,134,11,0.08);
  }
  h1.brand[contenteditable="true"]:focus {
    background: rgba(184,134,11,0.12);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .brand-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .edit-hint {
    font-size: 11px;
    color: var(--text-light);
    opacity: 0.5;
    margin-top: 2px;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .brand-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 8px auto 0;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.4em;
    margin: 12px 0 32px;
    text-align: center;
  }

  /* ===== Buttons ===== */
  button, .button {
    font-family: inherit;
    padding: 10px 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 1px 3px rgba(44,21,56,0.04);
  }
  button:hover, .button:hover {
    background: #fafafa;
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(44,21,56,0.08);
  }
  button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-bright));
    color: #ffffff;
    font-weight: 600;
    border-color: var(--accent);
    text-shadow: 0 1px 1px rgba(0,0,0,0.15);
  }
  button.primary:hover {
    background: linear-gradient(135deg, #c8930e, #e0bb45);
    box-shadow: 0 6px 24px rgba(184,134,11,0.35);
  }
  button.big {
    padding: 18px 56px;
    font-size: 22px;
    border-radius: 12px;
    letter-spacing: 0.18em;
  }
  button.ghost {
    background: transparent;
    color: var(--text-mid);
  }

  /* ===== Floating restart ===== */
  #restartBtn {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 1000;
    padding: 6px 12px;
    font-size: 12px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  #restartBtn:hover { opacity: 1; }
  #restartBtn.hidden { display: none; }

  /* ===== Screen 1: Upload ===== */
  #screen-upload .upload-zone {
    width: min(640px, 90vw);
    padding: 40px;
    border: 2px dashed var(--accent-soft);
    border-radius: 16px;
    background: var(--bg-card);
    text-align: center;
    transition: all 0.2s;
    box-shadow: var(--paper-shadow);
  }
  #screen-upload .upload-zone.dragover {
    border-color: var(--accent);
    background: #fffbf2;
    transform: scale(1.02);
  }
  .upload-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .upload-text {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .upload-sub {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 24px;
  }
  .upload-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .upload-format {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border-soft);
    font-size: 12px;
    color: var(--text-mid);
    text-align: left;
    line-height: 1.7;
  }
  .upload-format code {
    background: #f5efe2;
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--accent);
    font-family: monospace;
    font-size: 11px;
  }
  .upload-format table {
    width: 100%;
    margin: 10px 0;
    border-collapse: collapse;
    font-size: 11px;
  }
  .upload-format th, .upload-format td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: center;
  }
  .upload-format th {
    background: #faf2dd;
    color: var(--accent);
  }
  .upload-error {
    margin-top: 16px;
    padding: 10px 14px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    color: #b91c1c;
    font-size: 13px;
  }

  /* ===== Screen 2: Loading ===== */
  .loading-content {
    width: min(500px, 80vw);
    text-align: center;
  }
  .loading-text {
    font-size: 13px;
    color: var(--text-mid);
    letter-spacing: 0.3em;
    margin-bottom: 20px;
  }
  .loading-bar {
    width: 100%;
    height: 10px;
    background: #f0e6d2;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .loading-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    transition: width 0.1s linear;
  }
  .loading-percent {
    font-size: 38px;
    font-weight: 600;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  /* ===== Screen 3: Confirm (score preview) ===== */
  #screen-confirm { padding: 32px 24px; justify-content: flex-start; }
  .confirm-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .confirm-title {
    font-size: 22px;
    color: var(--text);
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }
  .confirm-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.3em;
  }
  .confirm-info {
    text-align: center;
    margin: 12px 0 20px;
    color: var(--text-mid);
    font-size: 14px;
    letter-spacing: 0.1em;
  }
  .confirm-info .num {
    color: var(--accent);
    font-size: 22px;
    font-weight: 700;
    margin: 0 6px;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
  }
  .confirm-table-wrap {
    flex: 1;
    width: min(960px, 94vw);
    overflow-y: auto;
    background: var(--bg-card);
    border-radius: 10px;
    box-shadow: var(--paper-shadow);
    margin-bottom: 20px;
  }
  .confirm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .confirm-table th, .confirm-table td {
    padding: 10px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border-soft);
  }
  .confirm-table th {
    background: #faf5e8;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.1em;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .confirm-table td.team-name {
    text-align: left;
    font-weight: 600;
    color: var(--text);
  }
  .confirm-table td.team-color {
    width: 8px;
    padding: 0;
  }
  .confirm-table td.team-color .swatch {
    width: 8px;
    height: 32px;
    margin: 0 auto;
    border-radius: 2px;
  }
  .confirm-table td.total {
    font-weight: 700;
    color: var(--accent);
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    font-size: 15px;
    background: #fdfaf0;
  }
  .confirm-table td.rank-cell {
    font-weight: 700;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    font-size: 16px;
    color: var(--text-mid);
    width: 56px;
  }
  .confirm-table td.rank-cell.r1 { color: var(--accent-bright); font-size: 20px; background: #fdf5d8; }
  .confirm-table td.rank-cell.r2 { color: #888; background: #f5f5f5; }
  .confirm-table td.rank-cell.r3 { color: #cd7f32; background: #fdf0e1; }
  .confirm-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* ===== Screen 4: Ready (just start button) ===== */
  #screen-ready { gap: 28px; }
  .ready-title {
    font-size: clamp(24px, 3vw, 36px);
    color: var(--text);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 12px;
  }
  .ready-sub {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 0.5em;
    text-align: center;
    margin-bottom: 8px;
  }
  .ready-deco {
    font-size: 40px;
    color: var(--accent);
    opacity: 0.6;
    letter-spacing: 0.4em;
    margin-bottom: 32px;
  }

  /* ===== Screen 5: Stacking ===== */
  #screen-stacking { padding: 0; }
  .stacking-header {
    width: 100%;
    text-align: center;
    padding: 16px 24px 10px;
    flex-shrink: 0;
    position: relative;
  }
  .stacking-title {
    font-size: 14px;
    color: var(--text-light);
    letter-spacing: 0.3em;
    margin-bottom: 4px;
  }
  .stacking-question {
    font-size: clamp(20px, 2.6vw, 32px);
    color: var(--accent);
    letter-spacing: 0.15em;
    font-weight: 600;
    transition: opacity 0.3s, transform 0.3s;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    /* Reserve enough vertical space so the header height never collapses
       between Q-number states and the "集計完了" state */
    min-height: 1.6em;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
  }
  .stacking-question .q-num {
    font-size: 1.4em;
    color: var(--rose);
    font-weight: 800;
    margin: 0 6px;
  }
  .stacking-question.flash {
    animation: qFlash 0.5s ease-out;
  }
  @keyframes qFlash {
    0%   { transform: scale(0.7); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  #stackingBoard {
    flex: 1;
    width: 100%;
    display: grid;
    gap: 6px;
    padding: 4px 12px 18px;
    min-height: 0;
    align-items: stretch;
  }
  .stack-col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100%;
  }
  .stack-score {
    text-align: center;
    font-size: clamp(20px, 2.6vw, 42px);
    font-weight: 800;
    color: var(--rose);
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
    height: 1.2em;
    line-height: 1;
  }
  .stack-container {
    flex: 1;
    position: relative;
    background: #f7f1e3;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border-soft);
    min-height: 0;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
  }
  .stack {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column-reverse;
  }
  .block {
    width: 100%;
    flex-shrink: 0;
    animation: blockPopIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 2px;
    border-top: 1px solid rgba(255,255,255,0.4);
    border-bottom: 1px solid rgba(0,0,0,0.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  @keyframes blockPopIn {
    from { transform: translateY(80%) scale(0.9); opacity: 0; }
    to   { transform: translateY(0) scale(1);    opacity: 1; }
  }
  .stack-name {
    margin-top: 8px;
    text-align: center;
    padding: 12px 6px;
    font-size: clamp(13px, 1.5vw, 20px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 0.03em;
    border-radius: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 2px 6px rgba(44,21,56,0.15);
  }

  /* ===== Screen 6: Top3 ===== */
  #screen-top3 {
    padding: 24px;
    justify-content: center;
    overflow-y: auto;
  }
  .top3-title {
    font-size: clamp(22px, 3vw, 36px);
    letter-spacing: 0.3em;
    color: var(--accent);
    margin: 0 0 clamp(20px, 4vh, 48px);
    text-align: center;
    flex-shrink: 0;
  }
  #top3Display {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(16px, 4vw, 60px);
    width: 100%;
  }
  .podium-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: podiumIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    max-width: 30%;
  }
  .podium-team.p2 { animation-delay: 0.2s; }
  .podium-team.p3 { animation-delay: 0.4s; }
  .podium-team.p1 { animation-delay: 0.6s; }
  @keyframes podiumIn {
    from { opacity: 0; transform: translateY(40px) scale(0.7); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .medal {
    font-size: clamp(40px, min(8vw, 12vh), 96px);
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
  }
  .podium-team.p1 .medal {
    font-size: clamp(56px, min(11vw, 16vh), 130px);
  }
  .podium-color {
    width: clamp(36px, 6vw, 80px);
    height: 8px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .podium-team.p1 .podium-color {
    height: 12px;
    width: clamp(56px, 8vw, 120px);
  }
  .podium-name {
    font-size: clamp(18px, min(3vw, 4vh), 36px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    word-break: keep-all;
    line-height: 1.2;
  }
  .podium-team.p1 .podium-name {
    font-size: clamp(24px, min(4.5vw, 6vh), 52px);
    color: var(--rose);
  }
  .podium-score {
    font-size: clamp(20px, min(3vw, 4vh), 38px);
    font-weight: 800;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .podium-team.p1 .podium-score {
    font-size: clamp(28px, min(5vw, 7vh), 60px);
  }

  /* ===== Screen 7: Ranking ===== */
  #screen-ranking {
    padding: 24px 24px 36px;
    justify-content: flex-start;
    overflow-y: auto;
  }
  .ranking-title {
    font-size: clamp(20px, 2.6vw, 30px);
    letter-spacing: 0.3em;
    color: var(--accent);
    margin: 8px 0 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .ranking-list-wrap {
    width: min(820px, 94vw);
    padding: 8px 4px 24px;
  }
  .ranking-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rank-row {
    display: grid;
    grid-template-columns: 56px 16px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 18px;
    background: var(--bg-card);
    border-radius: 8px;
    opacity: 0;
    transform: translateY(-28px);
    transition: opacity 0.7s ease-out, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    border-left: 4px solid transparent;
    box-shadow: var(--paper-shadow);
    will-change: transform, opacity;
  }
  .rank-row.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .rank-row.r1 {
    background: linear-gradient(90deg, #fdf5d8, #ffffff);
    border-left-color: var(--accent-bright);
    padding: 16px 20px;
    margin: 12px 0;
    box-shadow: 0 6px 30px rgba(212,175,55,0.25);
  }
  .rank-row.r2 {
    background: linear-gradient(90deg, #f5f5f5, #ffffff);
    border-left-color: silver;
  }
  .rank-row.r3 {
    background: linear-gradient(90deg, #fdf0e1, #ffffff);
    border-left-color: #cd7f32;
  }
  .rank-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    text-align: center;
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
  }
  .rank-row.r1 .rank-num { color: var(--accent-bright); font-size: 36px; }
  .rank-row.r2 .rank-num { color: #888; }
  .rank-row.r3 .rank-num { color: #cd7f32; }
  .rank-color {
    width: 16px;
    height: 36px;
    border-radius: 4px;
  }
  .rank-row.r1 .rank-color { height: 44px; }
  .rank-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rank-row.r1 .rank-name { font-size: 26px; color: var(--rose); }
  .rank-score {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    font-family: var(--font-main);
    font-variant-numeric: tabular-nums;
  }
  .rank-row.r1 .rank-score { font-size: 30px; color: var(--accent-bright); }

  /* ===== Confetti ===== */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

  /* ===== Screen-share notices ===== */
  #noShareNotice {
    position: fixed;
    bottom: 12px;
    right: 14px;
    font-size: 11px;
    color: #b91c1c;
    background: rgba(254, 242, 242, 0.95);
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid #fca5a5;
    z-index: 998;
    letter-spacing: 0.08em;
    display: none;
    pointer-events: none;
  }
  #noShareNotice.show { display: block; }

  #startShareOverlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(22px, 3.6vw, 44px);
    background: rgba(255, 255, 255, 0.98);
    color: var(--rose);
    padding: clamp(20px, 4vw, 36px) clamp(28px, 6vw, 60px);
    border-radius: 14px;
    border: 2px solid var(--accent);
    box-shadow: 0 14px 50px rgba(44,21,56,0.25);
    letter-spacing: 0.15em;
    z-index: 1100;
    display: none;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
  }
  #startShareOverlay.show {
    display: block;
    animation: shareOverlay 3s ease-out forwards;
  }
  @keyframes shareOverlay {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.82); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    82%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
  }
</style>
</head>
<body>

<button id="restartBtn" class="ghost hidden">↺ 最初から</button>
<div id="noShareNotice" class="show">⚠ 画面共有しないでください</div>

<!-- ============ Screen 1: Upload ============ -->
<div id="screen-upload" class="screen active">
  <div class="brand-wrap">
    <h1 class="brand" id="brandTitle" contenteditable="true" spellcheck="false"></h1>

<script>
"use strict";

// ============================================================
// State
// ============================================================
let teams = []; // {name, color, scores:[], total}
const TITLE_KEY = "quiz_event_title";
const DEFAULT_TITLE = "結婚式２次会 クイズ大会";

const screenIds = ["upload", "loading", "confirm", "ready", "stacking", "top3", "ranking"];

function showScreen(name) {
  screenIds.forEach(id => {
    const el = document.getElementById("screen-" + id);
    if (id === name) el.classList.add("active");
    else el.classList.remove("active");
  });
  const restart = document.getElementById("restartBtn");
  if (name === "upload") restart.classList.add("hidden");
  else restart.classList.remove("hidden");

  // "Don't share" notice: shown only on pre-reveal screens
  const noShare = document.getElementById("noShareNotice");
  if (["upload", "loading", "confirm"].includes(name)) noShare.classList.add("show");
  else noShare.classList.remove("show");

}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function showError(msg) {
  const el = document.getElementById("uploadError");
  el.textContent = msg;
  el.style.display = "block";
}
function clearError() {
  document.getElementById("uploadError").style.display = "none";
}

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// ============================================================
// Editable title
// ============================================================
function loadTitle() {
  return localStorage.getItem(TITLE_KEY) || DEFAULT_TITLE;
}
function saveTitle(t) {
  const clean = t.trim() || DEFAULT_TITLE;
  localStorage.setItem(TITLE_KEY, clean);
  updateAllTitles(clean);
  return clean;
}
function updateAllTitles(t) {
  const title = t || loadTitle();
  document.getElementById("brandTitle").textContent = title;
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("readyTitle").textContent = title;
  document.getElementById("stackingTitle").textContent = title;
  document.title = title + " - 結果発表";
}

// ============================================================
// File parsing
// ============================================================
function handleFile(file) {
  clearError();
  if (!file) return;
  if (!/\.(xlsx|xls|csv)$/i.test(file.name)) {
    showError("対応形式は .xlsx / .xls / .csv です");
    return;
  }

  showScreen("loading");
  animateLoading(0, 25, 300);

  const reader = new FileReader();
  reader.onload = (e) => {
    animateLoading(25, 70, 600);
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      teams = parseRows(rows);
      animateLoading(70, 100, 700, () => {
        setTimeout(() => showConfirm(), 400);
      });
    } catch (err) {
      console.error(err);
      showScreen("upload");
      showError("ファイルの読み込みに失敗しました: " + err.message);
    }
  };
  reader.onerror = () => {
    showScreen("upload");
    showError("ファイルを読み込めませんでした");
  };
  reader.readAsArrayBuffer(file);
}

function parseRows(rows) {
  if (!rows || rows.length < 2) throw new Error("データ行が見つかりません");
  const headers = rows[0].map(h => String(h || "").trim());
  const nameIdx = 0;
  const colorIdx = 1;
  const scoreIndices = [];
  const scoreHeaders = [];
  for (let i = 2; i < headers.length; i++) {
    if (headers[i] !== "") {
      scoreIndices.push(i);
      scoreHeaders.push(headers[i]);
    }
  }
  if (scoreIndices.length === 0) throw new Error("クイズ列(Q1, Q2…)が見つかりません");

  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const name = String(row[nameIdx] || "").trim();
    if (!name) continue;
    const color = normalizeColor(row[colorIdx]);
    const scores = scoreIndices.map(i => Number(row[i]) || 0);
    const total = scores.reduce((a, b) => a + b, 0);
    out.push({ name, color, scores, total });
  }
  if (out.length === 0) throw new Error("有効なチーム行が見つかりません");
  out._scoreHeaders = scoreHeaders;
  return out;
}

function normalizeColor(c) {
  if (!c) return "#888";
  let s = String(c).trim();
  if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(s)) return s;
  if (/^[0-9a-f]{6}$/i.test(s)) return "#" + s;
  const named = {
    "赤":"#e63946","青":"#118ab2","黄":"#ffd166","緑":"#06d6a0",
    "橙":"#f4a261","紫":"#8338ec","桃":"#ef476f","水":"#4ecdc4",
    "金":"#d4af37","銀":"#c0c0c0","白":"#ffffff","黒":"#333333",
    "red":"#e63946","blue":"#118ab2","yellow":"#ffd166","green":"#06d6a0",
    "orange":"#f4a261","purple":"#8338ec","pink":"#ef476f","cyan":"#4ecdc4",
    "gold":"#d4af37","silver":"#c0c0c0","white":"#ffffff","black":"#333333"
  };
  return named[s.toLowerCase()] || named[s] || s;
}

// ============================================================
// Loading bar animation
// ============================================================
function animateLoading(from, to, duration, onDone) {
  const fill = document.getElementById("loadingBarFill");
  const text = document.getElementById("loadingPercent");
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const ease = 1 - Math.pow(1 - t, 2);
    const val = from + (to - from) * ease;
    fill.style.width = val + "%";
    text.textContent = Math.round(val) + "%";
    if (t < 1) requestAnimationFrame(step);
    else if (onDone) onDone();
  }
  requestAnimationFrame(step);
}

// ============================================================
// Screen 3: Confirm (score preview table)
// ============================================================
function showConfirm() {
  const maxScore = Math.max(...teams.map(t => t.total));
  const totalQs = teams[0]?.scores.length || 0;

  document.getElementById("confirmInfo").innerHTML = `
    <span class="num">${teams.length}</span>チーム
    全<span class="num">${totalQs}</span>問
    最高得点<span class="num">${maxScore}</span>pt
  `;

  const table = document.getElementById("confirmTable");
  const scoreHeaders = teams._scoreHeaders || teams[0].scores.map((_, i) => `Q${i + 1}`);

  // Compute ranks based on total (ties share rank)
  const sortedIdx = teams.map((t, i) => ({ t, i }))
    .sort((a, b) => b.t.total - a.t.total);
  const ranks = new Array(teams.length);
  let curRank = 0, lastScore = null;
  sortedIdx.forEach((entry, n) => {
    if (entry.t.total !== lastScore) { curRank = n + 1; lastScore = entry.t.total; }
    ranks[entry.i] = curRank;
  });

  let html = "<thead><tr><th>順位</th><th></th><th style='text-align:left;padding-left:8px;'>チーム名</th>";
  scoreHeaders.forEach(h => { html += `<th>${escapeHtml(h)}</th>`; });
  html += "<th>合計</th></tr></thead><tbody>";

  // Display sorted by rank
  sortedIdx.forEach(({ t, i }) => {
    const rank = ranks[i];
    const rankCls = rank <= 3 ? `rank-cell r${rank}` : "rank-cell";
    html += "<tr>";
    html += `<td class="${rankCls}">${rank}</td>`;
    html += `<td class="team-color"><div class="swatch" style="background:${t.color}"></div></td>`;
    html += `<td class="team-name">${escapeHtml(t.name)}</td>`;
    t.scores.forEach(s => {
      html += `<td>${s || ""}</td>`;
    });
    html += `<td class="total">${t.total}</td>`;
    html += "</tr>";
  });
  html += "</tbody>";
  table.innerHTML = html;

  showScreen("confirm");
}

// ============================================================
// Screen 4: Ready - just start button
// ============================================================
function showReady() {
  showScreen("ready");
}

// ============================================================
// Screen 5: Stacking animation - per-question pacing
// ============================================================
function startReveal() {
  setupStackingBoard();
  showScreen("stacking");
  requestAnimationFrame(() => requestAnimationFrame(() => {
    runStackingAnimation().then(() => {
      setTimeout(showTop3, 1500);
    });
  }));
}

function setupStackingBoard() {
  const board = document.getElementById("stackingBoard");
  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${teams.length}, minmax(0, 1fr))`;

  teams.forEach((t, i) => {
    const col = document.createElement("div");
    col.className = "stack-col";
    const textColor = contrastTextColor(t.color);
    col.innerHTML = `
      <div class="stack-score" id="stack-score-${i}">0</div>
      <div class="stack-container">
        <div class="stack" id="stack-${i}"></div>
      </div>
      <div class="stack-name" style="background:${t.color};color:${textColor}" title="${escapeHtml(t.name)}">${escapeHtml(t.name)}</div>
    `;
    board.appendChild(col);
  });
  document.getElementById("stackingQuestion").innerHTML = "";
}

function contrastTextColor(hex) {
  const c = String(hex || "").replace("#", "");
  if (c.length !== 6 && c.length !== 3) return "#ffffff";
  const full = c.length === 3 ? c.split("").map(ch => ch + ch).join("") : c;
  const r = parseInt(full.substr(0, 2), 16);
  const g = parseInt(full.substr(2, 2), 16);
  const b = parseInt(full.substr(4, 2), 16);
  // Perceived luminance (sRGB approximation)
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.6 ? "#2c1538" : "#ffffff";
}

async function runStackingAnimation() {
  const numQuestions = teams[0]?.scores.length || 0;
  if (numQuestions === 0) return;

  // Reverse-calculate block size: 1st place's stack should fill the container.
  // block height = container height / 1st place's pts
  const firstPlacePts = Math.max(...teams.map(t => t.total));
  if (firstPlacePts === 0) return;

  const sample = document.querySelector(".stack-container");
  const containerHeight = sample.clientHeight;

  // Adaptive gap: chunky gaps when each block is big (low pt total),
  // shrink to 0 when blocks are very thin (high pt total).
  const blockHeightIdeal = containerHeight / firstPlacePts;
  let gap;
  if (blockHeightIdeal >= 30)      gap = 5;
  else if (blockHeightIdeal >= 15) gap = 3;
  else if (blockHeightIdeal >= 8)  gap = 2;
  else if (blockHeightIdeal >= 4)  gap = 1;
  else                              gap = 0;

  const totalGap = gap * Math.max(0, firstPlacePts - 1);
  const blockHeight = Math.max(1, (containerHeight - totalGap) / firstPlacePts);

  document.querySelectorAll("#stackingBoard .stack").forEach(el => {
    el.style.gap = gap + "px";
  });

  const stackEls = teams.map((_, i) => document.getElementById("stack-" + i));
  const scoreEls = teams.map((_, i) => document.getElementById("stack-score-" + i));
  const runningScores = teams.map(() => 0);

  // Show initial Q1 indicator
  for (let q = 0; q < numQuestions; q++) {
    // Show question indicator with flash
    showQuestionIndicator(q + 1, numQuestions);
    await sleep(800);

    // Compute Q points per team
    const qPoints = teams.map(t => t.scores[q]);
    const maxQ = Math.max(...qPoints);

    if (maxQ > 0) {
      // Per-tick: each team that has remaining qPoints adds one block
      const perBlockMs = Math.max(60, Math.min(180, 1200 / maxQ));
      for (let tick = 1; tick <= maxQ; tick++) {
        teams.forEach((t, i) => {
          if (tick <= qPoints[i]) {
            const block = document.createElement("div");
            block.className = "block";
            block.style.height = blockHeight + "px";
            block.style.background = t.color;
            stackEls[i].appendChild(block);
            runningScores[i]++;
            scoreEls[i].textContent = runningScores[i];
          }
        });
        await sleep(perBlockMs);
      }
    }

    // Pause between questions (the "beat")
    await sleep(900);
  }

  // Final "完了"
  const qIndicator = document.getElementById("stackingQuestion");
  qIndicator.innerHTML = `<span class="q-num" style="margin:0;">✦ 集計完了 ✦</span>`;
  qIndicator.classList.remove("flash");
  void qIndicator.offsetWidth;
  qIndicator.classList.add("flash");
  await sleep(1200);
}

function showQuestionIndicator(q, total) {
  const el = document.getElementById("stackingQuestion");
  el.innerHTML = `Question<span class="q-num">${q}</span><span style="opacity:0.4;"> / ${total}</span>`;
  el.classList.remove("flash");
  void el.offsetWidth; // force reflow
  el.classList.add("flash");
}

// ============================================================
// Screen 6: Top 3
// ============================================================
function showTop3() {
  const sorted = [...teams].sort((a, b) => b.total - a.total);
  const top3 = sorted.slice(0, 3);
  const display = document.getElementById("top3Display");
  display.innerHTML = "";

  const order = [];
  if (top3[1]) order.push({ t: top3[1], medal: "🥈", cls: "p2" });
  if (top3[0]) order.push({ t: top3[0], medal: "🥇", cls: "p1" });
  if (top3[2]) order.push({ t: top3[2], medal: "🥉", cls: "p3" });

  order.forEach(({ t, medal, cls }) => {
    const el = document.createElement("div");
    el.className = "podium-team " + cls;
    el.innerHTML = `
      <div class="medal">${medal}</div>
      <div class="podium-color" style="background:${t.color}"></div>
      <div class="podium-name">${escapeHtml(t.name)}</div>
      <div class="podium-score">${t.total}<span style="font-size:0.5em;opacity:0.7;margin-left:4px;">pt</span></div>
    `;
    display.appendChild(el);
  });

  showScreen("top3");
  setTimeout(celebrate, 800);
  setTimeout(showRanking, 5000);
}

// ============================================================
// Screen 7: Ranking reveal (from last place upward)
// ============================================================
function showRanking() {
  const sorted = [...teams].sort((a, b) => b.total - a.total);
  const ranks = [];
  let curRank = 0, lastScore = null;
  sorted.forEach((t, i) => {
    if (t.total !== lastScore) { curRank = i + 1; lastScore = t.total; }
    ranks.push(curRank);
  });

  const list = document.getElementById("rankingList");
  list.innerHTML = "";

  showScreen("ranking");

  const screen = document.getElementById("screen-ranking");
  const wrap = document.querySelector(".ranking-list-wrap");
  // Reset any previous centering shift from a prior run
  wrap.style.transition = "none";
  wrap.style.transform = "";
  screen.scrollTop = 0;

  // Reveal worst-rank first; each new row is inserted at the TOP of the list
  // so previously revealed rows are pushed down. Final layout: 1 at top, last at bottom.
  const revealOrder = sorted.map((_, i) => i).reverse(); // [lastIdx, ..., bestIdx]
  const stepMs = Math.max(800, Math.min(1400, 12000 / revealOrder.length));

  // FLIP animation: existing rows smoothly slide down to make room for the new row,
  // while the new row slides down from above.
  const FLIP_DURATION = "0.7s";
  const FLIP_EASING = "cubic-bezier(0.22, 1, 0.36, 1)";

  revealOrder.forEach((origIdx, n) => {
    setTimeout(() => {
      const t = sorted[origIdx];
      const rank = ranks[origIdx];

      // FIRST: snapshot positions of existing rows before insertion
      const existing = Array.from(list.children);
      // Snap any in-flight transforms to their CSS-final state so we measure cleanly
      existing.forEach(r => {
        r.style.transition = "none";
        r.style.transform = "translateY(0)";
      });
      // Force layout commit
      void list.offsetHeight;
      const prevTops = existing.map(r => r.getBoundingClientRect().top);

      // Insert the new row at the top
      const row = document.createElement("div");
      row.className = "rank-row r" + rank;
      row.innerHTML = `
        <div class="rank-num">${rank}</div>
        <div class="rank-color" style="background:${t.color}"></div>
        <div class="rank-name">${escapeHtml(t.name)}</div>
        <div class="rank-score">${t.total}<span style="font-size:0.5em;opacity:0.7;margin-left:3px;">pt</span></div>
      `;
      list.insertBefore(row, list.firstChild);

      // LAST + INVERT: measure new positions of existing rows; apply inverse transform
      existing.forEach((r, i) => {
        const newTop = r.getBoundingClientRect().top;
        const dy = prevTops[i] - newTop;
        if (Math.abs(dy) > 0.5) {
          r.style.transform = `translateY(${dy}px)`;
        }
      });
      // Commit the inverted state without transition
      void list.offsetHeight;

      // PLAY: next frame, enable transitions and animate everything to natural position
      requestAnimationFrame(() => {
        existing.forEach(r => {
          r.style.transition = `transform ${FLIP_DURATION} ${FLIP_EASING}`;
          r.style.transform = "translateY(0)";
        });
        row.classList.add("revealed");
      });
    }, n * stepMs);
  });

  setTimeout(() => {
    celebrate(true);
  }, revealOrder.length * stepMs + 500);
}

// ============================================================
// Confetti
// ============================================================
function celebrate(big = false) {
  const canvas = document.createElement("canvas");
  canvas.className = "confetti";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");

  const colors = ["#d4af37", "#b8860b", "#8b1538", "#c2185b", "#e8d795", "#f5d670", "#f4a261", "#ef476f"];
  const count = big ? 300 : 180;
  const pieces = [];
  for (let i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.3,
      vx: (Math.random() - 0.5) * 5,
      vy: 2 + Math.random() * 5,
      size: 6 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vRot: (Math.random() - 0.5) * 0.25,
    });
  }
  let frames = 0;
  const maxFrames = big ? 480 : 340;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vRot;
      p.vy += 0.06;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });
    frames++;
    if (frames < maxFrames) requestAnimationFrame(loop);
    else canvas.remove();
  }
  loop();
}

// ============================================================
// Sample CSV download
// ============================================================
function downloadSample() {
  const colors = ["#e63946","#f4a261","#e9c46a","#2a9d8f","#264653","#06d6a0",
                  "#118ab2","#073b4c","#ef476f","#ffd166","#8338ec","#ff6b6b"];
  const header = ["チーム名","カラー","Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8"];
  const rows = [header];
  for (let i = 0; i < 12; i++) {
    const r = [`チーム${i + 1}`, colors[i]];
    for (let q = 0; q < 8; q++) r.push(Math.floor(Math.random() * 4) * 10);
    rows.push(r);
  }
  const csv = "﻿" + rows.map(r => r.join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "quiz-template.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

// ============================================================
// Demo data

function loadDemo() {
  const colors = ["#e63946","#f4a261","#e9c46a","#2a9d8f","#264653","#06d6a0",
                  "#118ab2","#073b4c","#ef476f","#ffd166","#8338ec","#ff6b6b"];
  const names = ["新郎チーム","新婦チーム","幼馴染","大学同期","会社同僚","親戚一同",
                 "サッカー部","軽音部","旅行仲間","ゲーム友","近所組","研究室"];
  teams = [];
  const headers = [];
  for (let q = 0; q < 7; q++) headers.push(`Q${q + 1}`);
  for (let i = 0; i < 12; i++) {
    const scores = [];
    for (let q = 0; q < 7; q++) scores.push(Math.floor(Math.random() * 4) * 10);
    teams.push({
      name: names[i],
      color: colors[i],
      scores,
      total: scores.reduce((a, b) => a + b, 0)
    });
  }
  teams._scoreHeaders = headers;
  showConfirm();
}

// ============================================================
// Event bindings
// ============================================================
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const brandTitle = document.getElementById("brandTitle");

// Initialize titles
updateAllTitles();

// Editable title behavior
brandTitle.addEventListener("blur", () => {
  saveTitle(brandTitle.textContent);
});
brandTitle.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    brandTitle.blur();
  }
});
brandTitle.addEventListener("paste", (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text").replace(/\n/g, " ");
  document.execCommand("insertText", false, text);
});

document.getElementById("btnPickFile").onclick = () => fileInput.click();
fileInput.onchange = (e) => {
  const f = e.target.files[0];
  if (f) handleFile(f);
  fileInput.value = "";
};

document.getElementById("btnSample").onclick = downloadSample;
document.getElementById("btnDemo").onclick = loadDemo;
document.getElementById("btnBackToUpload").onclick = () => showScreen("upload");
document.getElementById("btnReady").onclick = showReady;
document.getElementById("btnStart").onclick = startReveal;
document.getElementById("restartBtn").onclick = () => {
  if (confirm("最初の画面に戻りますか？")) {
    teams = [];
    showScreen("upload");
    clearError();
  }
};

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});
dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("dragover");
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("drop", e => e.preventDefault());

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.activeElement !== brandTitle) {
    document.getElementById("restartBtn").click();
  }
});
</script>
</body>
</html>
